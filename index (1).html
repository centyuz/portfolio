<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Centyuz</title>
  <link rel="icon" href="imgs/favicon.png" type="image/x-icon">
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/5f61ca79dc.js" crossorigin="anonymous"></script>
</head>

<body>
  <div class="container">

    <div class="header">
      <h1 class="title">Centyuz<div class="aurora" aria-hidden="true">
          <div class="aurora__item"></div>
          <div class="aurora__item"></div>
          <div class="aurora__item"></div>
          <div class="aurora__item"></div>
        </div>
      </h1>
      <p class="header-sub">Student · Creator · Gamer</p>
    </div>

    <div class="bento-grid">

      <div class="bento-section-label">Games I Play</div>

      <a href="#" class="bento-cell game-card game-roblox" aria-label="Roblox">
        <div class="game-visual">
          <img src="imgs/roblox.svg" class="game-icon" alt="Roblox">
          <div class="char-popup">
            <img src="imgs/roblox_avatar.svg" class="char-img" alt="My Roblox character">
          </div>
        </div>
        <div class="game-info">
          <div class="card-title">Roblox</div>
          <div class="card-subtitle">DesaBLX</div>
        </div>
      </a>

      <a href="#" class="bento-cell game-card game-stumble" aria-label="Stumble Guys">
        <div class="game-visual">
          <img src="imgs/stumbleguys.svg" class="game-icon" alt="Stumble Guys">
          <div class="char-popup">
            <img src="imgs/stumbleguys_skin.svg" class="char-img" alt="My Stumble Guys character">
          </div>
        </div>
        <div class="game-info">
          <div class="card-title">Stumble Guys</div>
          <div class="card-subtitle">Centyuz</div>
        </div>
      </a>

      <a href="#" class="bento-cell game-card game-minecraft" aria-label="Minecraft">
        <div class="game-visual">
          <img src="imgs/minecraft.png" class="game-icon" alt="Minecraft">
          <div class="char-popup">
            <img src="imgs/minecraft_skin.svg" class="char-img" alt="My Minecraft character">
          </div>
        </div>
        <div class="game-info">
          <div class="card-title">Minecraft</div>
          <div class="card-subtitle">Centyuz</div>
        </div>
      </a>

      <div class="bento-section-label">Find Me</div>

      <a href="https://x.com/Desilioen/" target="_blank" class="bento-cell social-cell cell-x" aria-label="X profile">
        <i class="fa-brands fa-x-twitter bento-icon"></i>
        <div class="social-text">
          <div class="card-title">X</div>
          <div class="card-subtitle">@Centyuz</div>
        </div>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <a href="https://open.spotify.com/user/31sxazlj4fj5mmtz3hi5kpez77za?si=iOYPWy58S_-aPsbqGNMC1Q" target="_blank" class="bento-cell social-cell cell-spotify" aria-label="Spotify profile">
        <i class="fa-brands fa-spotify bento-icon"></i>
        <div class="social-text">
          <div class="card-title">Spotify</div>
          <div class="card-subtitle">Centyuz</div>
        </div>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <a href="https://youtube.com/@Desilioen/" target="_blank" class="bento-cell social-cell cell-youtube" aria-label="YouTube profile">
        <i class="fa-brands fa-youtube bento-icon"></i>
        <div class="social-text">
          <div class="card-title">YouTube</div>
          <div class="card-subtitle">Centyuz</div>
        </div>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <a href="https://github.com/Desilioen/" target="_blank" class="bento-cell social-cell cell-github" aria-label="GitHub profile">
        <i class="fa-brands fa-github bento-icon"></i>
        <div class="social-text">
          <div class="card-title">GitHub</div>
          <div class="card-subtitle">Centyuz</div>
        </div>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <a href="https://discord.gg/629xJrtk" target="_blank" class="bento-cell social-cell cell-discord discord-wide" aria-label="Discord user">
        <i class="fa-brands fa-discord bento-icon"></i>
        <div class="social-text">
          <div class="card-title">Discord</div>
          <div class="card-subtitle">Centyuz</div>
        </div>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
